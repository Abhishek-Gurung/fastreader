<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="icon.jpg">
<title>⚡Fast Reading Tool</title>

<style>
    body {
        margin: 0;
		font-family: 'Inter', 'Georgia', serif;
		background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
		color: #fff;
		display: flex;
		justify-content: center;
		align-items: center;
		min-height: 100vh;
    }

    .container {
	margin-bottom: 80px; /* space for footer */
        width: 90%;
        max-width: 900px;
        backdrop-filter: blur(20px);
        background: rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
        font-weight: 600;
    }

    p {
        text-align: center;
        opacity: 0.8;
        margin-bottom: 25px;
    }

    textarea {
        font-family: 'Inter', sans-serif;
		font-size: 16px;
		line-height: 1.6;
		width: 100%;
        height: 140px;
        border-radius: 12px;
        border: none;
        padding: 15px;
        background: rgba(255,255,255,0.1);
        color: white;
        outline: none;
        resize: none;
    }

    textarea::placeholder {
        color: rgba(255,255,255,0.6);
    }

    .textarea-wrapper {
        position: relative;
        margin-bottom: 15px;
    }

    .paste-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 8px;
        background: #00c6ff;
        border: none;
        cursor: pointer;
        color: white;
    }

    .controls {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 20px;
    }

    button {
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        border: none;
        padding: 10px 18px;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    #output {
        background: rgba(0,0,0,0.3);
        padding: 25px;
        border-radius: 15px;
        max-height: 300px;
        overflow-y: auto;
		font-family: 'Inter', sans-serif;
		font-size: 21px;
		line-height: 2;
		letter-spacing: 0.4px;
    margin: auto;
    }

    b {
        font-weight: 800;
        color: #ffffff;
    }

    span {
        color: #cfcfcf;
    }

    #output::-webkit-scrollbar {
        width: 6px;
    }

    #output::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 10px;
    }
	
	.footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.08);
    
    text-align: center;
    padding: 12px 10px;
    
    font-size: 14px;
    color: #ddd;
    
    border-top: 1px solid rgba(255,255,255,0.15);
}

.footer span {
    font-size: 12px;
    opacity: 0.7;
    margin-left: 8px;
}

/* Default link */
a {
    color: #00c6ff;
    text-decoration: none;
    font-weight: 500;
    position: relative;
    transition: 0.3s ease;
}

/* Underline animation */
a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -2px;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    transition: width 0.3s ease;
}

/* Hover effect */
a:hover {
    color: #ffffff;
}

a:hover::after {
    width: 100%;
}
</style>
</head>

<body>

<div class="container">
    <h1>⚡ Fast Reader <span style="font-size: 15px;">for ADHDers</span></h1>
    <p>Focus faster. Read smarter.</p>

    <div class="textarea-wrapper">
        <textarea id="input" placeholder="Paste your text here..."></textarea>
        <button class="paste-btn" onclick="pasteText()">Paste</button>
    </div>

    <div class="controls">
        <button onclick="processText()">Convert</button>
        <button onclick="clearText()">Clear</button>
    </div>

    <div id="output"></div>
</div>
<div class="footer">
    <p>
        © Copyright 2026. Made by
          <a rel="noreferrer" target="_blank" href="abhishek-gurung.github.io/portfolio">Abhishek Gurung</a>
    </p>
</div>
<script>
function bionifyWord(word) {
    const match = word.match(/^([a-zA-Z]+)([^a-zA-Z]*)$/);
    if (!match) return word;

    let [_, cleanWord, punctuation] = match;

    let mid;
    if (cleanWord.length <= 3) {
        mid = 1;
    } else if (cleanWord.length <= 6) {
        mid = Math.ceil(cleanWord.length * 0.5);
    } else {
        mid = Math.ceil(cleanWord.length * 0.4);
    }

    return `<b>${cleanWord.substring(0, mid)}</b>${cleanWord.substring(mid)}${punctuation}`;
}

function processText() {
    const input = document.getElementById('input').value;
    const outputDiv = document.getElementById('output');

    const words = input.split(/(\s+)/);

    const bionified = words.map(part => {
        if (/\S/.test(part)) {
            return bionifyWord(part);
        }
        return part;
    }).join('');

    outputDiv.innerHTML = bionified;
}

async function pasteText() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById('input').value = text;
    } catch (err) {
        alert("Clipboard access denied. Please allow permissions.");
    }
}

function clearText() {
    document.getElementById('input').value = "";
    document.getElementById('output').innerHTML = "";
}
</script>

</body>
</html>
